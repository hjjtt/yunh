spring:
  application:
    name: yunh-service-pay
  cloud:
    nacos:
      discovery:
        enabled: true
        server-addr: 127.0.0.1:8848
        namespace: public
        username: your_nacos_username
        password: your_password_here
      config:
        enabled: true
        server-addr: 127.0.0.1:8848
        file-extension: yml
        group: DEFAULT_GROUP
        username: your_nacos_username
        password: your_password_here
    sentinel:
      transport:
        dashboard: 127.0.0.1:8098
        port: 8729
      eager: true

logging:
  level:
    com.alibaba.cloud.nacos.client.NacosPropertySourceBuilder: ERROR
    com.alibaba.nacos.client.config.impl: WARN
